version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: /Dockerfile
    container_name: ras-api

    env_file:
      - ../.env

    command: uvicorn run:app --host 0.0.0.0 --port 5001

    expose:
      - "5001"

    volumes:
      - ./uploads:/app/uploads

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - ras_net
      - dokploy-network

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.api.rule=Host(`api.rasuniandes.org`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.services.api.loadbalancer.server.port=5001"

  db:
    image: mysql:8.0.35
    container_name: ras-mysql

    env_file:
      - ../.env

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: defaultdb
      MYSQL_USER: ras_user
      MYSQL_PASSWORD: ABCDABC4

    volumes:
      - mysqldata:/var/lib/mysql

    networks:
      - ras_net

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: ras-redis

    networks:
      - ras_net

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysqldata:

networks:
  ras_net:
    driver: bridge
  dokploy-network:
    external: true