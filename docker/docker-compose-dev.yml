services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ras-api
    ports:
      - "5001:5001"
    env_file:
      - ../.env
    command: uvicorn run:app --host 0.0.0.0 --port 5001 --reload
    volumes:
      - ../:/app 
      - ./uploads:/app/uploads
      - ./vector_store:/app/vector_store
    
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ras_net
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.rasuniandes.org`)"
      - "traefik.http.services.api.loadbalancer.server.port=5001"
  db:
    image: mysql:8.0.35
    container_name: ras-mysql
    env_file:
      - ../.env
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: defaultdb
      MYSQL_USER: ras_user
      MYSQL_PASSWORD: ABCDABC4

      
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./db/init_utf8.sql:/docker-entrypoint-initdb.d/init_utf8.sql:ro
    networks:
      - ras_net
      - dokploy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7
    container_name: ras-redis
    ports:
      - "6379:6379"
    networks:
      - ras_net
      - dokploy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysqldata:

networks:
  ras_net:
    driver: bridge
  dokploy-network:
    external: true